<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  :root{
    --bg:#F7F5F1;
    --panel:#FFFFFF;
    --panel-2:#F0EDE7;
    --accent:#C97D2C;
    --accent-2:#3C8C7A;
    --text:#1F2A29;
    --text-dim:#6B7674;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Tahoma','Segoe UI',sans-serif;
    padding:24px;
  }
  h1{font-size:22px;margin:0 0 4px;}
  .subtitle{color:var(--text-dim);font-size:13px;margin-bottom:20px;}

  .day-tabs{
    display:flex;
    gap:8px;
    margin-bottom:20px;
    flex-wrap:wrap;
  }
  .day-tab{
    background:var(--panel-2);
    border:1px solid rgba(0,0,0,0.1);
    color:var(--text-dim);
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    font-weight:bold;
    transition:0.15s;
  }
  .day-tab:hover{ color:var(--text); }
  .day-tab.active{
    background:var(--accent);
    color:#13231F;
    border-color:var(--accent);
  }

  .summary{
    display:flex;
    gap:16px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .summary .chip{
    background:var(--panel);
    border-radius:10px;
    padding:8px 14px;
    font-size:13px;
    color:var(--text-dim);
  }
  .summary .chip b{ color:var(--accent-2); font-size:15px; }

  .timeline{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .lecture-card{
    background:var(--panel);
    border-radius:12px;
    padding:14px 16px;
    border:1px solid rgba(0,0,0,0.08);
    box-shadow:0 1px 4px rgba(0,0,0,0.05);
    display:grid;
    grid-template-columns:110px 1fr auto;
    gap:14px;
    align-items:center;
  }
  @media (max-width:700px){
    .lecture-card{ grid-template-columns:1fr; gap:8px; }
  }
  .time-box{
    text-align:center;
    background:var(--panel-2);
    border-radius:8px;
    padding:8px 6px;
  }
  .time-box .t{ font-size:14px; font-weight:bold; color:var(--accent); }
  .time-box .lbl{ font-size:10px; color:var(--text-dim); margin-top:2px; }

  .lecture-info .course{ font-size:15px; font-weight:bold; margin-bottom:3px; }
  .lecture-info .meta{ font-size:12.5px; color:var(--text-dim); }
  .lecture-info .meta span{ margin-left:10px; }

  .room-badge{
    background:rgba(95,184,166,0.15);
    color:var(--accent-2);
    padding:6px 12px;
    border-radius:20px;
    font-size:12.5px;
    font-weight:bold;
    white-space:nowrap;
  }

  .free-days{
    background:var(--panel);
    border:1px solid rgba(95,184,166,0.3);
    border-radius:10px;
    padding:10px 14px;
    margin-bottom:16px;
    font-size:13px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .free-days .lbl{ color:var(--text-dim); }
  .free-days .day-chip{
    background:rgba(95,184,166,0.18);
    color:var(--accent-2);
    padding:3px 10px;
    border-radius:14px;
    font-weight:bold;
  }
  .free-days .none{ color:var(--text-dim); font-style:italic; }
    text-align:center;
    color:var(--text-dim);
    padding:40px 10px;
    font-size:14px;
  }

  .search-box{
    margin-bottom:16px;
  }
  .search-box input{
    width:100%;
    max-width:320px;
    background:var(--panel-2);
    border:1px solid rgba(0,0,0,0.1);
    border-radius:8px;
    padding:9px 12px;
    color:var(--text);
    font-size:13px;
    font-family:inherit;
  }

  .filters-row{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    margin-bottom:18px;
  }
  .filter-group{ display:flex; flex-direction:column; min-width:170px; }
  .filter-group label{
    font-size:11.5px;
    color:var(--text-dim);
    margin-bottom:4px;
  }
  .filter-group select, .filter-group input{
    background:var(--panel-2);
    border:1px solid rgba(0,0,0,0.1);
    border-radius:8px;
    padding:9px 12px;
    color:var(--text);
    font-size:13px;
    font-family:inherit;
  }
</style>
</head>
<body>

<h1>📅 جدول المحاضرات اليومي</h1>
<div class="subtitle">اختاري اليوم لعرض كل المحاضرات المجدولة مع الوقت والقاعة والمدربة</div>

<div class="filters-row">
  <div class="filter-group">
    <label>القسم</label>
    <select id="sectionFilter">
      <option value="">كل الأقسام</option>
    </select>
  </div>
  <div class="filter-group">
    <label>المدربة</label>
    <select id="trainerFilter">
      <option value="">كل المدربات</option>
    </select>
  </div>
  <div class="filter-group">
    <label>نوع الشعبة</label>
    <select id="typeFilter">
      <option value="">كل الأنواع</option>
    </select>
  </div>
  <div class="filter-group">
    <label>القاعة / المعمل</label>
    <select id="roomFilter">
      <option value="">كل القاعات</option>
    </select>
  </div>
  <div class="filter-group">
    <label>من الساعة</label>
    <input type="time" id="timeFromFilter">
  </div>
  <div class="filter-group">
    <label>إلى الساعة</label>
    <input type="time" id="timeToFilter">
  </div>
  <div class="filter-group" style="flex:1;min-width:180px;">
    <label>بحث</label>
    <input id="searchInput" placeholder="بحث بالمدربة أو المقرر...">
  </div>
</div>

<div class="day-tabs" id="dayTabs"></div>

<div class="summary" id="summaryBox"></div>
<div id="freeDaysBox"></div>

<div class="timeline" id="timeline"></div>

const DAYS_ORDER = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس"];
let currentDay = null;
let searchTerm = "";
let sectionFilter = "";
let trainerFilter = "";
let typeFilter = "";
let roomFilter = "";
let timeFromFilter = "";
let timeToFilter = "";

function timeStrToMinutes(t){
  // t format "HH:MM" from <input type=time>
  const [h,m] = t.split(":").map(Number);
  return h*60+m;
}

function timeToMinutes(t){
  // format "1140 - 1000" -> use start time "1000" for sorting
  const start = t.split("-")[1] ? t.split("-")[1].trim() : t;
  const h = parseInt(start.slice(0,2));
  const m = parseInt(start.slice(2,4));
  return h*60+m;
}

function formatTime(t){
  const parts = t.split("-").map(s=>s.trim());
  if(parts.length!==2) return t;
  const fmt = (x)=>{
    let h = parseInt(x.slice(0,2));
    let m = x.slice(2,4);
    const period = h>=12 ? "م" : "ص";
    let h12 = h%12; if(h12===0) h12=12;
    return h12+":"+m+" "+period;
  };
  return fmt(parts[1])+" - "+fmt(parts[0]);
}

function buildFilterOptions(){
  const sections = [...new Set(SCHEDULE.map(r=>r.section))].sort();
  const sectionSel = document.getElementById("sectionFilter");
  sectionSel.innerHTML = '<option value="">كل الأقسام</option>' +
    sections.map(s=>`<option value="${s}">${s}</option>`).join("");

  sectionSel.addEventListener("change", (e)=>{
    sectionFilter = e.target.value;
    refreshTrainerOptions();
    render();
  });

  refreshTrainerOptions();

  const types = [...new Set(SCHEDULE.map(r=>r.type))].sort();
  const typeSel = document.getElementById("typeFilter");
  typeSel.innerHTML = '<option value="">كل الأنواع</option>' +
    types.map(t=>`<option value="${t}">${t}</option>`).join("");
  typeSel.addEventListener("change", (e)=>{
    typeFilter = e.target.value;
    render();
  });

  const rooms = [...new Set(SCHEDULE.map(r=>r.roomDesc).filter(Boolean))].sort();
  const roomSel = document.getElementById("roomFilter");
  roomSel.innerHTML = '<option value="">كل القاعات</option>' +
    rooms.map(r=>`<option value="${r}">${r}</option>`).join("");
  roomSel.addEventListener("change", (e)=>{
    roomFilter = e.target.value;
    render();
  });

  document.getElementById("timeFromFilter").addEventListener("change", (e)=>{
    timeFromFilter = e.target.value;
    render();
  });
  document.getElementById("timeToFilter").addEventListener("change", (e)=>{
    timeToFilter = e.target.value;
    render();
  });
}

function refreshTrainerOptions(){
  const trainerSel = document.getElementById("trainerFilter");
  const prevValue = trainerFilter;
  let pool = SCHEDULE;
  if(sectionFilter){ pool = pool.filter(r=>r.section===sectionFilter); }
  const trainers = [...new Set(pool.map(r=>r.trainer))].sort();
  trainerSel.innerHTML = '<option value="">كل المدربات</option>' +
    trainers.map(t=>`<option value="${t}">${t}</option>`).join("");
  if(trainers.includes(prevValue)){
    trainerSel.value = prevValue;
  } else {
    trainerFilter = "";
  }
  trainerSel.onchange = (e)=>{
    trainerFilter = e.target.value;
    render();
  };
}

function buildTabs(){
  const wrap = document.getElementById("dayTabs");
  const availableDays = [...new Set(SCHEDULE.map(r=>r.day))];
  const ordered = DAYS_ORDER.filter(d=>availableDays.includes(d));
  wrap.innerHTML = ordered.map(d=>
    `<div class="day-tab" data-day="${d}" onclick="selectDay('${d}')">${d}</div>`
  ).join("");
  if(ordered.length){ selectDay(ordered[0]); }
}

function selectDay(day){
  currentDay = day;
  document.querySelectorAll(".day-tab").forEach(el=>{
    el.classList.toggle("active", el.dataset.day===day);
  });
  render();
}

function render(){
  let items = SCHEDULE.filter(r=>r.day===currentDay);

  if(sectionFilter){
    items = items.filter(r=>r.section===sectionFilter);
  }
  if(trainerFilter){
    items = items.filter(r=>r.trainer===trainerFilter);
  }
  if(typeFilter){
    items = items.filter(r=>r.type===typeFilter);
  }
  if(roomFilter){
    items = items.filter(r=>r.roomDesc===roomFilter);
  }
  if(timeFromFilter){
    const fromMin = timeStrToMinutes(timeFromFilter);
    items = items.filter(r=>timeToMinutes(r.time)>=fromMin);
  }
  if(timeToFilter){
    const toMin = timeStrToMinutes(timeToFilter);
    items = items.filter(r=>timeToMinutes(r.time)<=toMin);
  }
  if(searchTerm.trim()){
    const q = searchTerm.trim();
    items = items.filter(r=>
      r.trainer.includes(q) || r.course.includes(q) || r.courseCode.includes(q) || (r.roomDesc && r.roomDesc.includes(q))
    );
  }

  items.sort((a,b)=>timeToMinutes(a.time)-timeToMinutes(b.time));

  const trainersCount = new Set(items.map(r=>r.trainer)).size;
  document.getElementById("summaryBox").innerHTML = `
    <div class="chip"><b>${items.length}</b> محاضرة</div>
    <div class="chip"><b>${trainersCount}</b> مدربة</div>
  `;

  const wrap = document.getElementById("timeline");
  if(items.length===0){
    wrap.innerHTML = '<div class="empty">لا توجد محاضرات مطابقة في هذا اليوم</div>';
  } else {
    wrap.innerHTML = items.map(r=>`
      <div class="lecture-card">
        <div class="time-box">
          <div class="t">${formatTime(r.time)}</div>
          <div class="lbl">الوقت</div>
        </div>
        <div class="lecture-info">
          <div class="course">${r.course} <span style="color:var(--text-dim);font-weight:normal;font-size:12px;">(${r.courseCode})</span></div>
          <div class="meta">
            <span>👤 ${r.trainer}</span>
            <span>📚 ${r.section}</span>
            <span>🏷️ ${r.type}</span>
          </div>
        </div>
        <div class="room-badge">🏫 ${r.roomDesc || ('قاعة ' + r.room)}</div>
      </div>
    `).join("");
  }

  renderFreeDays();
}

function renderFreeDays(){
  const box = document.getElementById("freeDaysBox");
  if(!trainerFilter){
    box.innerHTML = "";
    return;
  }
  const availableDays = [...new Set(SCHEDULE.map(r=>r.day))];
  const ordered = DAYS_ORDER.filter(d=>availableDays.includes(d));
  const trainerDays = new Set(SCHEDULE.filter(r=>r.trainer===trainerFilter).map(r=>r.day));
  const freeDays = ordered.filter(d=>!trainerDays.has(d));

  if(freeDays.length===0){
    box.innerHTML = `<div class="free-days"><span class="lbl">📅 أيام ${trainerFilter} الفارغة:</span><span class="none">لا يوجد يوم فارغ — لديها محاضرات في كل الأيام</span></div>`;
  } else {
    box.innerHTML = `<div class="free-days"><span class="lbl">📅 أيام ${trainerFilter} الفارغة:</span>${freeDays.map(d=>`<span class="day-chip">${d}</span>`).join("")}</div>`;
  }
}

document.getElementById("searchInput").addEventListener("input", (e)=>{
  searchTerm = e.target.value;
  render();
});

buildFilterOptions();
buildTabs();
</script>

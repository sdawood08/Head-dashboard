<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  :root{
    --bg:#F7F5F1; --panel:#FFFFFF; --panel-2:#F0EDE7;
    --accent:#C97D2C; --accent-2:#3C8C7A; --text:#1F2A29; --text-dim:#6B7674; --danger:#C0463A;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:'Tahoma','Segoe UI',sans-serif; padding:24px; }
  h1{ font-size:22px; margin:0 0 4px; }
  .subtitle{ color:var(--text-dim); font-size:13px; margin-bottom:20px; }

  .reminder-banner{
    background:#FCEFE3; border:1px solid var(--accent); border-radius:10px;
    padding:10px 16px; font-size:12.5px; margin-bottom:16px;
  }

  .top-row{ display:flex; gap:14px; flex-wrap:wrap; margin-bottom:18px; align-items:flex-end; }
  .field{ display:flex; flex-direction:column; min-width:220px; }
  .field label{ font-size:11.5px; color:var(--text-dim); margin-bottom:4px; }
  .field input, .field select{
    background:var(--panel-2); border:1px solid rgba(0,0,0,0.1); border-radius:8px;
    padding:9px 12px; color:var(--text); font-size:13px; font-family:inherit;
  }

  .overview-table{
    background:var(--panel); border-radius:12px; padding:16px 18px; margin-bottom:18px;
    border:1px solid rgba(0,0,0,0.08); box-shadow:0 1px 4px rgba(0,0,0,0.05);
  }
  .overview-table h3{ font-size:13.5px; color:var(--accent); margin:0 0 10px; }
  table{ width:100%; border-collapse:collapse; font-size:12.5px; }
  th{ text-align:right; color:var(--text-dim); font-weight:normal; border-bottom:1px solid rgba(0,0,0,0.1); padding:6px 4px; }
  td{ padding:7px 4px; border-bottom:1px solid rgba(0,0,0,0.05); }
  .score-bar-track{ background:var(--panel-2); border-radius:10px; height:8px; width:100px; overflow:hidden; display:inline-block; vertical-align:middle; margin-left:6px; }
  .score-bar-fill{ background:var(--accent-2); height:100%; border-radius:10px; }
  .score-bar-fill.low{ background:var(--danger); }
  .eval-row{ cursor:pointer; }
  .eval-row:hover{ background:var(--panel-2); }

  .eval-panel{
    background:var(--panel); border-radius:12px; padding:18px; margin-bottom:18px;
    border:1px solid rgba(0,0,0,0.08); box-shadow:0 1px 4px rgba(0,0,0,0.05);
  }
  .eval-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:10px; }
  .eval-header .name{ font-size:16px; font-weight:bold; }
  .eval-total{ font-size:14px; font-weight:bold; color:var(--accent-2); }
  .eval-total.low{ color:var(--danger); }

  .group-block{ margin-bottom:16px; border-top:1px solid rgba(0,0,0,0.06); padding-top:12px; }
  .group-block:first-of-type{ border-top:none; }
  .group-title{ font-size:13px; font-weight:bold; color:var(--accent); margin-bottom:8px; display:flex; justify-content:space-between; }
  .group-title .gsub{ font-size:12px; color:var(--accent-2); font-weight:normal; }

  .criteria-row{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    padding:6px 0; border-bottom:1px solid rgba(0,0,0,0.04); font-size:12.5px;
  }
  .criteria-row:last-child{ border-bottom:none; }
  .criteria-row .label{ flex:1; }
  .criteria-row .weight-hint{ color:var(--text-dim); font-size:11px; }
  .criteria-row input{
    width:65px; text-align:center; background:var(--panel-2); border:1px solid rgba(0,0,0,0.1);
    border-radius:8px; padding:5px; font-size:12.5px; font-family:inherit;
  }

  .empty{ text-align:center; color:var(--text-dim); padding:30px; }
</style>
</head>

let scores = {};
let currentTrainer = "";

function scoreKey(trainer, group, label){
  return trainer + "||" + group + "||" + label;
}

function loadScores(){
  try{
    const raw = localStorage.getItem('trainer-evaluation');
    scores = raw ? JSON.parse(raw) : {};
  }catch(e){ scores = {}; }
}
function saveScores(){
  try{ localStorage.setItem('trainer-evaluation', JSON.stringify(scores)); }
  catch(e){ console.error('فشل الحفظ', e); }
}

function getScore(trainer, group, label){
  const k = scoreKey(trainer, group, label);
  return k in scores ? scores[k] : 0;
}
function setScore(trainer, group, label, value, maxWeight){
  let v = parseFloat(value);
  if(isNaN(v)) v = 0;
  if(v < 0) v = 0;
  if(v > maxWeight) v = maxWeight;
  scores[scoreKey(trainer, group, label)] = v;
  saveScores();
  renderEvalPanel();
  renderOverview();
}

function computeTrainerTotal(trainer){
  let total = 0;
  EVAL_DATA.criteria.forEach(c=>{
    total += getScore(trainer, c.group, c.label);
  });
  return total;
}

function buildTrainerSelect(){
  const sel = document.getElementById('trainerSelect');
  sel.innerHTML = EVAL_DATA.trainers.map(t=>`<option value="${t}">${t}</option>`).join('');
  sel.addEventListener('change', (e)=>{
    currentTrainer = e.target.value;
    renderEvalPanel();
  });
  currentTrainer = EVAL_DATA.trainers[0] || "";
  sel.value = currentTrainer;
}

function renderEvalPanel(){
  const wrap = document.getElementById('evalPanel');
  if(!currentTrainer){
    wrap.innerHTML = '<div class="empty">لا توجد مدربات</div>';
    return;
  }
  const total = computeTrainerTotal(currentTrainer);
  const scaled100 = EVAL_DATA.totalWeight ? (total/EVAL_DATA.totalWeight)*100 : 0;
  const pct = Math.round(scaled100);
  const isLow = pct < 60;

  const groupsHtml = EVAL_DATA.groups.map(g=>{
    const items = EVAL_DATA.criteria.filter(c=>c.group===g);
    const groupMax = items.reduce((s,c)=>s+c.weight,0);
    const groupScore = items.reduce((s,c)=>s+getScore(currentTrainer,c.group,c.label),0);
    const rows = items.map(c=>{
      const val = getScore(currentTrainer, c.group, c.label);
      return `
        <div class="criteria-row">
          <span class="label">${c.label} <span class="weight-hint">(من ${c.weight})</span></span>
          <input type="number" min="0" max="${c.weight}" step="0.5" value="${val}"
            onchange="setScore('${currentTrainer.replace(/'/g,"\'")}', '${g.replace(/'/g,"\'")}', '${c.label.replace(/'/g,"\'")}', this.value, ${c.weight})">
        </div>
      `;
    }).join('');
    return `
      <div class="group-block">
        <div class="group-title"><span>${g}</span><span class="gsub">${groupScore.toFixed(1)} / ${groupMax}</span></div>
        ${rows}
      </div>
    `;
  }).join('');

  wrap.innerHTML = `
    <div class="eval-panel">
      <div class="eval-header">
        <span class="name">👤 ${currentTrainer}</span>
        <span class="eval-total ${isLow?'low':''}">الإجمالي: ${scaled100.toFixed(1)} / 100</span>
      </div>
      ${groupsHtml}
    </div>
  `;
}

function renderOverview(){
  const wrap = document.getElementById('overviewBox');
  const rows = EVAL_DATA.trainers.map(t=>{
    const total = computeTrainerTotal(t);
    const scaled100 = EVAL_DATA.totalWeight ? (total/EVAL_DATA.totalWeight)*100 : 0;
    const pct = Math.round(scaled100);
    return {t, scaled100, pct};
  }).sort((a,b)=>b.pct-a.pct);

  wrap.innerHTML = `
    <table>
      <tr><th>المدربة</th><th>الدرجة</th><th>النسبة</th></tr>
      ${rows.map(r=>`
        <tr class="eval-row" onclick="selectTrainerFromTable('${r.t.replace(/'/g,"\'")}')">
          <td>${r.t}</td>
          <td>${r.scaled100.toFixed(1)} / 100</td>
          <td>
            ${r.pct}%
            <span class="score-bar-track"><span class="score-bar-fill ${r.pct<60?'low':''}" style="width:${r.pct}%"></span></span>
          </td>
        </tr>
      `).join('')}
    </table>
  `;
}

function selectTrainerFromTable(trainer){
  currentTrainer = trainer;
  document.getElementById('trainerSelect').value = trainer;
  renderEvalPanel();
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderReminderBanner(){
  const banner = document.getElementById('reminderBanner');
  let lastExport = null;
  try{ lastExport = localStorage.getItem('evaluation-last-export'); }catch(e){}
  if(!lastExport){
    banner.innerHTML = `<div class="reminder-banner">📤 لم يسبق تصدير نسخة من تقييمات المدربات. يُفضّل تصدير نسخة بشكل دوري.</div>`;
    return;
  }
  const days = Math.floor((new Date() - new Date(lastExport)) / (1000*60*60*24));
  if(days >= 14){
    banner.innerHTML = `<div class="reminder-banner">📤 آخر تصدير كان منذ ${days} يومًا — حان وقت تصدير نسخة جديدة.</div>`;
  } else {
    banner.innerHTML = '';
  }
}

function exportToCSV(){
  const headers = ['المدربة','المجموعة','البند','الدرجة من','الدرجة المُسجّلة'];
  const lines = [headers.join(',')];

  EVAL_DATA.trainers.forEach(t=>{
    EVAL_DATA.criteria.forEach(c=>{
      const val = getScore(t, c.group, c.label);
      lines.push([`"${t}"`,`"${c.group}"`,`"${c.label}"`, c.weight, val].join(','));
    });
    const total = computeTrainerTotal(t);
    const scaled100 = EVAL_DATA.totalWeight ? (total/EVAL_DATA.totalWeight)*100 : 0;
    lines.push([`"${t}"`,`"الإجمالي النهائي"`,`"الدرجة من 100"`, 100, scaled100.toFixed(1)].join(','));
  });

  const csvContent = "\ufeff" + lines.join('\n');
  const blob = new Blob([csvContent], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'trainer_evaluation_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  try{ localStorage.setItem('evaluation-last-export', new Date().toISOString()); }catch(e){}
  renderReminderBanner();
}
document.getElementById('exportBtn').addEventListener('click', exportToCSV);

loadScores();
buildTrainerSelect();
renderEvalPanel();
renderOverview();
renderReminderBanner();
</script>

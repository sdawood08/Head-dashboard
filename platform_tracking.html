<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  :root{
    --bg:#F7F5F1;
    --panel:#FFFFFF;
    --panel-2:#F0EDE7;
    --accent:#C97D2C;
    --accent-2:#3C8C7A;
    --text:#1F2A29;
    --text-dim:#6B7674;
    --danger:#C0463A;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:'Tahoma','Segoe UI',sans-serif; padding:24px; }
  h1{ font-size:22px; margin:0 0 4px; }
  .subtitle{ color:var(--text-dim); font-size:13px; margin-bottom:20px; }

  .top-row{ display:flex; gap:14px; flex-wrap:wrap; margin-bottom:18px; align-items:flex-end; }
  .field{ display:flex; flex-direction:column; min-width:200px; }
  .field label{ font-size:11.5px; color:var(--text-dim); margin-bottom:4px; }
  .field input, .field select{
    background:var(--panel-2); border:1px solid rgba(0,0,0,0.1); border-radius:8px;
    padding:9px 12px; color:var(--text); font-size:13px; font-family:inherit;
  }

  .overall-bar{
    background:var(--panel); border-radius:12px; padding:14px 18px; margin-bottom:18px;
    border:1px solid rgba(0,0,0,0.08); box-shadow:0 1px 4px rgba(0,0,0,0.05);
  }
  .overall-bar .label{ font-size:13px; color:var(--text-dim); margin-bottom:6px; display:flex; justify-content:space-between; }
  .bar-track{ background:var(--panel-2); border-radius:20px; height:10px; overflow:hidden; }
  .bar-fill{ background:var(--accent-2); height:100%; border-radius:20px; transition:width 0.3s; }

  .trainer-card{
    background:var(--panel); border-radius:12px; padding:16px 18px; margin-bottom:14px;
    border:1px solid rgba(0,0,0,0.08); box-shadow:0 1px 4px rgba(0,0,0,0.05);
  }
  .trainer-head{ display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
  .trainer-head .name{ font-size:15px; font-weight:bold; }
  .trainer-head .pct{ font-size:13px; color:var(--accent-2); font-weight:bold; }
  .trainer-head .toggle{ color:var(--text-dim); font-size:12px; margin-right:8px; }

  .course-block{ margin-top:14px; border-top:1px solid rgba(0,0,0,0.06); padding-top:12px; }
  .course-block:first-of-type{ border-top:none; }
  .course-title{ font-size:13.5px; font-weight:bold; margin-bottom:8px; display:flex; justify-content:space-between; }
  .course-title .ref{ font-size:11px; color:var(--text-dim); font-weight:normal; }
  .course-pct{ font-size:12px; color:var(--accent-2); }

  .group-title{ font-size:11.5px; color:var(--text-dim); margin:10px 0 6px; font-weight:bold; }
  .items-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:6px; }
  .item-chip{
    display:flex; align-items:center; gap:6px; background:var(--panel-2); border-radius:8px;
    padding:6px 10px; font-size:12px; cursor:pointer; border:1px solid transparent;
  }
  .item-chip.checked{ background:rgba(60,140,122,0.15); border-color:var(--accent-2); color:var(--accent-2); font-weight:bold; }
  .item-chip input{ accent-color: var(--accent-2); }

  .hidden{ display:none; }
  .empty{ text-align:center; color:var(--text-dim); padding:30px; }

  .reminder-banner{
    background:#FCEFE3; border:1px solid var(--accent); border-radius:10px;
    padding:10px 16px; font-size:12.5px; margin-bottom:16px; display:flex;
    justify-content:space-between; align-items:center; gap:10px;
  }

  .gaps-panel{
    background:var(--panel); border-radius:12px; padding:16px 18px; margin-bottom:18px;
    border:1px solid rgba(192,70,58,0.3); box-shadow:0 1px 4px rgba(0,0,0,0.05);
  }
  .gaps-panel h3{ font-size:13.5px; color:var(--danger); margin:0 0 10px; }
  .gaps-cols{ display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; }
  .gaps-col-title{ font-size:11.5px; color:var(--text-dim); margin-bottom:6px; font-weight:bold; }
  .gap-row{ display:flex; justify-content:space-between; font-size:12.5px; padding:5px 0; border-bottom:1px solid rgba(0,0,0,0.05); }
  .gap-row b{ color:var(--danger); }

  .trainer-card.low-completion{ border-color:rgba(192,70,58,0.4); background:#FFF8F7; }
  .trainer-head .pct.low{ color:var(--danger); }

  .absence-badge{
    background:rgba(192,70,58,0.12); color:var(--danger); font-size:11px;
    padding:3px 8px; border-radius:10px; margin-right:6px; font-weight:bold;
  }

  .bulk-btn{
    background:var(--panel-2); border:1px solid rgba(0,0,0,0.1); color:var(--accent-2);
    border-radius:8px; padding:5px 10px; font-size:11.5px; cursor:pointer; font-weight:bold;
  }
  .bulk-btn:hover{ background:rgba(60,140,122,0.12); }

  .notes-box{ margin-top:12px; }
  .notes-box label{ font-size:11.5px; color:var(--text-dim); display:block; margin-bottom:4px; }
  .notes-box textarea{
    width:100%; min-height:50px; background:var(--panel-2); border:1px solid rgba(0,0,0,0.1);
    border-radius:8px; padding:8px 10px; font-size:12.5px; font-family:inherit; color:var(--text); resize:vertical;
  }
</style>
</head>
<body>

<h1>🖥️ متابعة منصة تقني</h1>
<div class="subtitle">متابعة استكمال متطلبات منصة تقني لكل مدربة ومقرر (خطة المقرر، الفصول الافتراضية، المهام، الاختبارات...)</div>

<button id="exportBtn" style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:bold;cursor:pointer;margin-bottom:18px;">⬇️ تصدير إلى Excel (CSV)</button>

<div id="reminderBanner"></div>

<div class="top-row">
  <div class="field">
    <label>المدربة</label>
    <select id="trainerFilter"><option value="">كل المدربات</option></select>
  </div>
  <div class="field">
    <label>المقرر</label>
    <select id="courseFilter"><option value="">كل المقررات</option></select>
  </div>
  <div class="field" style="flex:1;min-width:200px;">
    <label>بحث باسم المدربة أو المقرر</label>
    <input id="searchInput" placeholder="ابحثي هنا...">
  </div>
</div>

<div class="overall-bar">
  <div class="label"><span>نسبة الإنجاز الإجمالية</span><span id="overallPct">0%</span></div>
  <div class="bar-track"><div class="bar-fill" id="overallFill" style="width:0%"></div></div>
</div>

<div id="gapsPanel"></div>

<div id="trainersList"></div>

    checks = raw ? JSON.parse(raw) : {};
  }catch(e){ checks = {}; }
}
function saveChecks(){
  try{ localStorage.setItem('platform-tracking', JSON.stringify(checks)); }
  catch(e){ console.error('فشل الحفظ', e); }
}

function isChecked(trainer, course, item, defaultVal){
  const k = checkKey(trainer,course,item);
  return k in checks ? checks[k] : defaultVal;
}

const SHEETS_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbzrCds6xfATzHAV2w6LBfuwffrs5TZ_ydU4FPOKmqC4-OkzzA54zttI9koCBQThVBLL/exec";

function syncToSheets(payload){
  try{
    const qs = Object.keys(payload).map(k=>encodeURIComponent(k)+"="+encodeURIComponent(payload[k])).join("&");
    fetch(SHEETS_WEBHOOK_URL + "?" + qs, { method: 'GET', mode: 'no-cors' })
      .catch(()=>{ /* فشل صامت */ });
  }catch(e){ console.error('فشل المزامنة', e); }
}

function toggleItem(trainer, course, item, defaultVal){
  const k = checkKey(trainer,course,item);
  const current = isChecked(trainer,course,item,defaultVal);
  checks[k] = !current;
  saveChecks();
  render();

  const itemMeta = PLATFORM_DATA.items.find(it=>it.label===item);
  const row = PLATFORM_DATA.rows.find(r=>r.trainer===trainer && r.course===course);
  syncToSheets({
    "__sheet__": "منصة_تقني",
    "المدربة": trainer,
    "المقرر": course,
    "رقم الشعبة": row ? row.ref : "",
    "المجموعة": itemMeta ? itemMeta.group : "",
    "البند": item,
    "الحالة": !current ? "مكتمل" : "غير مكتمل"
  });
}

function courseCompletion(trainer, courseEntry){
  let total=0, done=0;
  PLATFORM_DATA.items.forEach(it=>{
    total++;
    if(isChecked(trainer, courseEntry.course, it.label, courseEntry.items[it.label])) done++;
  });
  return {done, total};
}

function buildTrainers(){
  const map = {};
  PLATFORM_DATA.rows.forEach(r=>{
    if(!map[r.trainer]) map[r.trainer] = [];
    map[r.trainer].push(r);
  });
  return map;
}
const TRAINERS_MAP = buildTrainers();

// ===== 1) النواقص الحرجة =====
function computeCriticalGaps(){
  const trainerStats = {};
  const itemMissCount = {};

  Object.keys(TRAINERS_MAP).forEach(trainer=>{
    let done=0, total=0;
    TRAINERS_MAP[trainer].forEach(c=>{
      PLATFORM_DATA.items.forEach(it=>{
        total++;
        const checked = isChecked(trainer, c.course, it.label, c.items[it.label]);
        if(checked) done++;
        else itemMissCount[it.label] = (itemMissCount[it.label]||0) + 1;
      });
    });
    trainerStats[trainer] = total ? Math.round((done/total)*100) : 0;
  });

  const worstTrainers = Object.entries(trainerStats)
    .sort((a,b)=>a[1]-b[1])
    .slice(0,5);

  const topMissingItems = Object.entries(itemMissCount)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5);

  return {worstTrainers, topMissingItems};
}

function renderGapsPanel(){
  const {worstTrainers, topMissingItems} = computeCriticalGaps();
  const panel = document.getElementById('gapsPanel');
  panel.innerHTML = `
    <div class="gaps-panel">
      <h3>⚠️ النواقص الحرجة</h3>
      <div class="gaps-cols">
        <div>
          <div class="gaps-col-title">أكثر 5 مدربات تأخرًا في الإنجاز</div>
          ${worstTrainers.map(([t,p])=>`<div class="gap-row"><span>${t}</span><b>${p}%</b></div>`).join('') || '<div class="gap-row">لا يوجد</div>'}
        </div>
        <div>
          <div class="gaps-col-title">أكثر البنود تكرارًا كنواقص</div>
          ${topMissingItems.map(([label,count])=>`<div class="gap-row"><span>${label}</span><b>${count}</b></div>`).join('') || '<div class="gap-row">لا يوجد</div>'}
        </div>
      </div>
    </div>
  `;
}

// ===== 4) ربط بصفحة الحضور (نفس متصفح/نطاق فقط) =====
function getAbsenceCounts(){
  const counts = {};
  try{
    const raw = localStorage.getItem('attendance-records');
    if(!raw) return counts;
    const data = JSON.parse(raw);
    Object.keys(data).forEach(key=>{
      const rest = key.split('|')[1];
      if(!rest) return;
      const parts = rest.split('_');
      const trainer = parts[1];
      if(data[key].status === 'غائبة'){
        counts[trainer] = (counts[trainer]||0) + 1;
      }
    });
  }catch(e){ /* تجاهل */ }
  return counts;
}
const ABSENCE_COUNTS = getAbsenceCounts();

// ===== 2) تأشير جماعي =====
function bulkSelectAllForTrainer(trainer){
  let delay = 0;
  TRAINERS_MAP[trainer].forEach(c=>{
    PLATFORM_DATA.items.forEach(it=>{
      checks[checkKey(trainer, c.course, it.label)] = true;
      const itemMeta = PLATFORM_DATA.items.find(x=>x.label===it.label);
      const rowRef = PLATFORM_DATA.rows.find(r=>r.trainer===trainer && r.course===c.course);
      setTimeout(()=>syncToSheets({
        "__sheet__": "منصة_تقني",
        "المدربة": trainer,
        "المقرر": c.course,
        "رقم الشعبة": rowRef ? rowRef.ref : "",
        "المجموعة": itemMeta ? itemMeta.group : "",
        "البند": it.label,
        "الحالة": "مكتمل"
      }), delay);
      delay += 80;
    });
  });
  saveChecks();
  render();
}

// ===== 6) ملاحظات عامة لكل مدربة =====
function loadAllNotes(){
  try{
    const raw = localStorage.getItem('platform-trainer-notes');
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}
let trainerNotes = loadAllNotes();
function saveTrainerNote(trainer, value){
  trainerNotes[trainer] = value;
  try{ localStorage.setItem('platform-trainer-notes', JSON.stringify(trainerNotes)); }
  catch(e){ console.error('فشل حفظ الملاحظة', e); }
}

// ===== 5) تذكير تصدير أسبوعي =====
function renderReminderBanner(){
  const banner = document.getElementById('reminderBanner');
  let lastExport = null;
  try{ lastExport = localStorage.getItem('platform-last-export'); }catch(e){}
  if(!lastExport){
    banner.innerHTML = `<div class="reminder-banner">📤 لم يسبق تصدير نسخة من هذي البيانات. يُفضّل تصدير نسخة أسبوعيًا.</div>`;
    return;
  }
  const days = Math.floor((new Date() - new Date(lastExport)) / (1000*60*60*24));
  if(days >= 7){
    banner.innerHTML = `<div class="reminder-banner">📤 آخر تصدير كان منذ ${days} يومًا — حان وقت تصدير نسخة جديدة.</div>`;
  } else {
    banner.innerHTML = '';
  }
}

function buildFilterOptions(){
  const trainerSel = document.getElementById('trainerFilter');
  const trainers = Object.keys(TRAINERS_MAP).sort();
  trainerSel.innerHTML = '<option value="">كل المدربات</option>' +
    trainers.map(t=>`<option value="${t}">${t}</option>`).join('');
  trainerSel.addEventListener('change', (e)=>{
    trainerFilter = e.target.value;
    refreshCourseOptions();
    render();
  });
  refreshCourseOptions();
}

function refreshCourseOptions(){
  const courseSel = document.getElementById('courseFilter');
  const prev = courseFilter;
  let pool = PLATFORM_DATA.rows;
  if(trainerFilter){ pool = pool.filter(r=>r.trainer===trainerFilter); }
  const courses = [...new Set(pool.map(r=>r.course))].sort();
  courseSel.innerHTML = '<option value="">كل المقررات</option>' +
    courses.map(c=>`<option value="${c}">${c}</option>`).join('');
  if(courses.includes(prev)){ courseSel.value = prev; } else { courseFilter = ""; }
  courseSel.onchange = (e)=>{ courseFilter = e.target.value; render(); };
}

function render(){
  const wrap = document.getElementById('trainersList');
  let trainerNames = Object.keys(TRAINERS_MAP);

  let totalAll=0, doneAll=0;

  let filtered = trainerNames.filter(t=>{
    if(trainerFilter && t!==trainerFilter) return false;
    if(!searchTerm.trim()) return true;
    const q = searchTerm.trim();
    if(t.includes(q)) return true;
    return TRAINERS_MAP[t].some(c=>c.course.includes(q));
  });

  const cardsArray = filtered.map(trainer=>{
    let courses = TRAINERS_MAP[trainer];
    if(courseFilter){ courses = courses.filter(c=>c.course===courseFilter); }
    if(courses.length===0) return '';
    let tDone=0, tTotal=0;
    const coursesHtml = courses.map(c=>{
      const comp = courseCompletion(trainer, c);
      tDone += comp.done; tTotal += comp.total;

      const groupsHtml = PLATFORM_DATA.groups.map(g=>{
        const groupItems = PLATFORM_DATA.items.filter(it=>it.group===g);
        const chips = groupItems.map(it=>{
          const checked = isChecked(trainer, c.course, it.label, c.items[it.label]);
          return `<div class="item-chip ${checked?'checked':''}" onclick="toggleItem('${trainer.replace(/'/g,"\\'")}','${c.course.replace(/'/g,"\\'")}','${it.label.replace(/'/g,"\\'")}', ${c.items[it.label]})">
            <input type="checkbox" ${checked?'checked':''} onclick="event.stopPropagation(); toggleItem('${trainer.replace(/'/g,"\\'")}','${c.course.replace(/'/g,"\\'")}','${it.label.replace(/'/g,"\\'")}', ${c.items[it.label]})">
            ${it.label}
          </div>`;
        }).join('');
        return `<div class="group-title">${g}</div><div class="items-grid">${chips}</div>`;
      }).join('');

      return `
        <div class="course-block">
          <div class="course-title">
            <span>📘 ${c.course} <span class="ref">(${c.ref})</span></span>
            <span class="course-pct">${comp.done}/${comp.total}</span>
          </div>
          ${groupsHtml}
        </div>
      `;
    }).join('');

    totalAll += tTotal; doneAll += tDone;
    const pct = tTotal ? Math.round((tDone/tTotal)*100) : 0;
    const isLow = pct < 50;
    const absences = ABSENCE_COUNTS[trainer] || 0;
    const noteVal = (trainerNotes[trainer] || '').replace(/"/g,'&quot;');

    return `
      <div class="trainer-card ${isLow?'low-completion':''}">
        <div class="trainer-head" onclick="toggleCollapse(this)">
          <span class="name">
            👤 ${trainer}
            ${absences>=3 ? `<span class="absence-badge">⚠️ ${absences} غياب</span>` : ''}
          </span>
          <span style="display:flex;align-items:center;gap:10px;">
            <span class="bulk-btn" onclick="event.stopPropagation(); bulkSelectAllForTrainer('${trainer.replace(/'/g,"\\'")}')">✅ تحديد الكل</span>
            <span class="pct ${isLow?'low':''}">${pct}% (${tDone}/${tTotal})</span>
          </span>
        </div>
        <div class="course-wrap">
          ${coursesHtml}
          <div class="notes-box">
            <label>📝 ملاحظات عامة عن المدربة</label>
            <textarea placeholder="اكتبي ملاحظاتك هنا..." onchange="saveTrainerNote('${trainer.replace(/'/g,"\\'")}', this.value)">${noteVal}</textarea>
          </div>
        </div>
      </div>
    `;
  }).filter(html=>html!=='');

  if(cardsArray.length===0){
    wrap.innerHTML = '<div class="empty">لا توجد نتائج مطابقة</div>';
  } else {
    wrap.innerHTML = cardsArray.join('');
  }

  renderGapsPanel();
  renderReminderBanner();

  const overallPct = totalAll ? Math.round((doneAll/totalAll)*100) : 0;
  document.getElementById('overallPct').textContent = overallPct + '% (' + doneAll + '/' + totalAll + ')';
  document.getElementById('overallFill').style.width = overallPct + '%';
}

function toggleCollapse(headEl){
  const wrap = headEl.nextElementSibling;
  wrap.classList.toggle('hidden');
}

document.getElementById('searchInput').addEventListener('input', (e)=>{
  searchTerm = e.target.value;
  render();
});

function exportToCSV(){
  const headers = ['المدربة','المقرر','رقم الشعبة','المجموعة','البند','الحالة'];
  const lines = [headers.join(',')];

  PLATFORM_DATA.rows.forEach(r=>{
    PLATFORM_DATA.items.forEach(it=>{
      const checked = isChecked(r.trainer, r.course, it.label, r.items[it.label]);
      const row = [
        `"${r.trainer}"`,
        `"${r.course}"`,
        `"${r.ref}"`,
        `"${it.group}"`,
        `"${it.label}"`,
        checked ? 'مكتمل' : 'غير مكتمل'
      ];
      lines.push(row.join(','));
    });
  });

  const csvContent = "\ufeff" + lines.join('\n');
  const blob = new Blob([csvContent], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'platform_tracking_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  try{ localStorage.setItem('platform-last-export', new Date().toISOString()); }catch(e){}
  renderReminderBanner();
}
document.getElementById('exportBtn').addEventListener('click', exportToCSV);

(async function init(){
  await loadChecks();
  buildFilterOptions();
  render();
})();
</script>
